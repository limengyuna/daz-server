version: '3.8'

# ===========================
# 找搭子系统 - Docker Compose 编排
# ===========================
# 使用方法:
#   1. 先执行: mvn clean package -DskipTests
#   2. 再执行: docker-compose up -d --build
#   3. 停止: docker-compose down
# ===========================

services:

  # ===========================
  # partner-gateway 网关服务 (入口)
  # ===========================
  partner-gateway:
    build:
      context: ./partner-gateway
      dockerfile: Dockerfile
    container_name: partner-gateway
    ports:
      - "8080:8080"
    depends_on:
      - partner-user
      - partner-post
      - partner-file-service
    networks:
      - partner-network
    restart: unless-stopped

  # ===========================
  # partner-user 用户服务
  # ===========================
  partner-user:
    build:
      context: ./partner-user
      dockerfile: Dockerfile
    container_name: partner-user
    ports:
      - "8081:8081"
    networks:
      - partner-network
    restart: unless-stopped

  # ===========================
  # partner-post 帖子/活动服务
  # ===========================
  partner-post:
    build:
      context: ./partner-post
      dockerfile: Dockerfile
    container_name: partner-post
    ports:
      - "8082:8082"
    networks:
      - partner-network
    restart: unless-stopped

  # ===========================
  # partner-file-service 文件服务
  # ===========================
  partner-file-service:
    build:
      context: ./partner-file-service
      dockerfile: Dockerfile
    container_name: partner-file-service
    ports:
      - "8083:8083"
    networks:
      - partner-network
    restart: unless-stopped

# ===========================
# Docker 网络
# ===========================
networks:
  partner-network:
    driver: bridge
