# ===========================
# Docker 环境专用配置 - 网关服务
# ===========================
# 使用 JDK DNS 解析器（解决 Docker 容器内 Netty DNS 解析失败问题）
reactor.netty.useJdkResolver=true
# 覆盖路由地址：localhost -> Docker 容器服务名
spring.cloud.gateway.routes[0].id=partner-user
spring.cloud.gateway.routes[0].uri=http://partner-user:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/user/**,/api/chat/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=partner-post
spring.cloud.gateway.routes[1].uri=http://partner-post:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/activities/**,/api/categories/**,/api/participants/**,/api/my/**,/api/moments/**,/api/reviews/**,/api/expenses/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=partner-file
spring.cloud.gateway.routes[2].uri=http://partner-file-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/file/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# ===========================
# 禁用 Sentinel（Docker 环境没有 Sentinel Dashboard，节省内存）
# ===========================
spring.cloud.sentinel.enabled=false

