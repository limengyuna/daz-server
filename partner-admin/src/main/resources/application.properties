# ===========================
# 应用基础配置
# ===========================
spring.application.name=partner-admin
server.port=8084

# ===========================
# 数据库配置 (本地开发，与其他服务共用同一数据库)
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zhao_dazi_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# Sentinel 熔断降级配置
# ===========================
spring.cloud.sentinel.transport.dashboard=127.0.0.1:8858
spring.cloud.sentinel.transport.port=8722

# ===========================
# 链路追踪配置 (Zipkin)
# ===========================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://127.0.0.1:9411/api/v2/spans

# ===========================
# Actuator 健康检查
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===========================
# MyBatis-Plus 配置
# ===========================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
