# 连接远程数据库（与原配置一致，如需改为 Docker 内 MySQL 可修改 host）
spring.datasource.url=jdbc:mysql://45.192.97.24:3306/zhao_dazi_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=3847

# ===========================
# 数据库连接池优化（节省内存）
# ===========================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000

# ===========================
# 禁用 Sentinel（Docker 环境没有 Sentinel Dashboard，节省内存）
# ===========================
spring.cloud.sentinel.enabled=false
