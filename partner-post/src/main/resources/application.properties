# ===========================
# 应用基础配置
# ===========================
spring.application.name=partner-post
server.port=8082

# ===========================
# 数据库配置 (本地开发)
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zhao_dazi_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===========================
# Sentinel 熔断降级配置
# ===========================
spring.cloud.sentinel.transport.dashboard=127.0.0.1:8858
spring.cloud.sentinel.transport.port=8720

# ===========================
# 链路追踪配置 (Zipkin)
# ===========================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://127.0.0.1:9411/api/v2/spans

# ===========================
# OpenFeign 配置
# ===========================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000
spring.cloud.openfeign.circuitbreaker.enabled=true
feign.sentinel.enabled=true

# ===========================
# Actuator 健康检查
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===========================
# MyBatis-Plus 配置
# ===========================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ===========================
# Spring AI - DeepSeek 配置
# ===========================
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:}
spring.ai.openai.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0.7

# ===========================
# 阿里通义 Embedding 模型配置（覆盖 DeepSeek 的 base-url）
# ===========================
spring.ai.openai.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
spring.ai.openai.embedding.api-key=${DASHSCOPE_API_KEY:}
spring.ai.openai.embedding.options.model=text-embedding-v4

# ===========================
# Milvus 向量数据库配置（RAG 语义召回）
# ===========================
spring.ai.vectorstore.milvus.client.host=localhost
spring.ai.vectorstore.milvus.client.port=19530
spring.ai.vectorstore.milvus.database-name=default
spring.ai.vectorstore.milvus.collection-name=activity_vectors
spring.ai.vectorstore.milvus.initialize-schema=true

# ===========================
# Redis 缓存配置
# ===========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
