# ===========================
# Docker 环境专用配置 - 帖子服务
# ===========================
# 连接远程数据库（与原配置一致）
spring.datasource.url=jdbc:mysql://45.192.97.24:3306/zhao_dazi_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=3847

# ===========================
# 数据库连接池优化（节省内存）
# ===========================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000

# ===========================
# Sentinel 熔断降级（连接 Docker 内 Sentinel Dashboard）
# ===========================
spring.cloud.sentinel.transport.dashboard=sentinel-dashboard:8858

# ===========================
# 链路追踪配置 (Zipkin - Docker 环境)
# ===========================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
